spring:
  application:
    name: insuhr-api

  # 공통 설정은 domain이 소유한다(설계서 3.0 v2.0): jpa-common(ddl-auto=validate, ORA-18716 회피),
  # crypto-common(AES 키·pepper). 빠지면 기동 실패가 아니라 런타임에 조용히 어긋나므로 구조로 강제한다.
  config:
    import:
      - "classpath:jpa-common.yml"
      - "classpath:crypto-common.yml"

  datasource:
    url: ${INSUHR_DB_URL:jdbc:oracle:thin:@localhost:1521/FREEPDB1}
    username: ${INSUHR_DB_USER:insuhr}
    password: ${INSUHR_DB_PASSWORD:insuhr}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 10000

  jpa:
    properties:
      hibernate:
        # 개발 편의(로그 SQL 포맷) — api 전용. 공통값은 jpa-common.yml에 있다.
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  jackson:
    default-property-inclusion: always

insuhr:
  jwt:
    # 시크릿은 환경변수로만 주입한다 (설계서 10.3 — 소스·DB 저장 금지).
    # 로컬 기본값은 개발 편의용이며 운영에서는 반드시 INSUHR_JWT_SECRET 를 설정해야 한다.
    secret: ${INSUHR_JWT_SECRET:local-dev-only-secret-do-not-use-in-production}
    issuer: insuhr

  # insuhr.crypto(AES 키·pepper)는 domain의 crypto-common.yml이 소유한다(위 config.import, 설계서 3.0 v2.0).

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  health:
    db:
      enabled: true

logging:
  pattern:
    # traceId(MDC)를 모든 로그 라인에 남긴다 — 응답 envelope의 traceId와 같은 값 (설계서 10.4)
    level: "%5p [%X{traceId:-}]"
  level:
    com.portfolio.insuhr: DEBUG
    org.flywaydb: INFO
