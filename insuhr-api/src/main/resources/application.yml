spring:
  application:
    name: insuhr-api

  datasource:
    url: ${INSUHR_DB_URL:jdbc:oracle:thin:@localhost:1521/FREEPDB1}
    username: ${INSUHR_DB_USER:insuhr}
    password: ${INSUHR_DB_PASSWORD:insuhr}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 10000

  jpa:
    # 설계서 13.1: 스키마는 Flyway만 만든다. 엔티티로 DDL을 생성하지 않는다.
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        type:
          # 설계서 6.2의 감사 컬럼은 존 없는 TIMESTAMP다. Hibernate 7 기본값(TIMESTAMP_UTC)은
          # Instant를 TIMESTAMP WITH TIME ZONE으로 다뤄서 읽을 때 ORA-18716이 난다.
          preferred_instant_jdbc_type: TIMESTAMP
        jdbc:
          # 존 없는 컬럼에 Instant를 넣으려면 어느 존으로 기록할지 규약이 필요하다.
          # DB에는 UTC로만 적재한다 — Oracle 컨테이너의 SYSTIMESTAMP(기본 UTC)와 어긋나지
          # 않게 하려는 것이다. 응답의 +09:00 변환은 API 계층이 한다(설계서 7.1).
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  jackson:
    default-property-inclusion: always

insuhr:
  jwt:
    # 시크릿은 환경변수로만 주입한다 (설계서 10.3 — 소스·DB 저장 금지).
    # 로컬 기본값은 개발 편의용이며 운영에서는 반드시 INSUHR_JWT_SECRET 를 설정해야 한다.
    secret: ${INSUHR_JWT_SECRET:local-dev-only-secret-do-not-use-in-production}
    issuer: insuhr

  crypto:
    # AES 키·pepper도 환경변수/외부 시크릿(운영 가정: KMS/Vault)에서 주입한다 (설계서 10.3).
    # 아래 기본값은 로컬 개발 전용이며 운영에 그대로 쓰면 안 된다.
    #
    # 키 회전(10.3): current-key-version 을 v2로 올리고 keys 에 v2를 추가하되,
    # v1은 지우지 않는다 — 과거 암호문을 복호화하려면 그 키가 계속 필요하다.
    current-key-version: ${INSUHR_AES_CURRENT_KEY_VERSION:v1}
    keys:
      v1: ${INSUHR_AES_KEY_V1:bG9jYWwtZGV2LW9ubHkta2V5LTMyYnl0ZXMtMDAwMDA=}
    pepper: ${INSUHR_RRN_PEPPER:local-dev-only-pepper-do-not-use-in-production}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  health:
    db:
      enabled: true

logging:
  pattern:
    # traceId(MDC)를 모든 로그 라인에 남긴다 — 응답 envelope의 traceId와 같은 값 (설계서 10.4)
    level: "%5p [%X{traceId:-}]"
  level:
    com.portfolio.insuhr: DEBUG
    org.flywaydb: INFO
