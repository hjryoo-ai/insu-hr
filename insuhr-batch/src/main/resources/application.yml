spring:
  application:
    name: insuhr-batch

  # 공통 설정은 domain이 소유한다(3.0 v2.0): jpa-common(ddl-auto=validate, ORA-18716 회피),
  # crypto-common(AES 키·pepper — IfSubscriberService 등 domain 빈 배선에 필요).
  config:
    import:
      - "classpath:jpa-common.yml"
      - "classpath:crypto-common.yml"

  datasource:
    url: ${INSUHR_DB_URL:jdbc:oracle:thin:@localhost:1521/FREEPDB1}
    username: ${INSUHR_DB_USER:insuhr}
    password: ${INSUHR_DB_PASSWORD:insuhr}
    driver-class-name: oracle.jdbc.OracleDriver

  # 스키마 마이그레이션의 실행 주체는 api 하나로 고정한다(설계서 4.2).
  # 다만 끄지는 않는다 — validate 전용으로 켜두면 api보다 batch가 먼저 뜨는 배포 순서 실수를
  # 런타임 SQL 에러가 아니라 기동 실패로 즉시 잡는다. FlywayValidateOnlyConfig 참조.
  flyway:
    enabled: true

# 배치 메타테이블은 Flyway가 소유한다(V14) — Boot 4.1은 배치 스키마를 자동 생성하지 않으므로
# Batch 5의 spring.batch.jdbc.initialize-schema 설정은 존재하지도 않는다(설계서 3.0 v2.0).
# 실행할 잡은 시동 시 반드시 --spring.batch.job.name=<잡명> 으로 지정한다.
# (미지정 시 JobLauncherApplicationRunner가 컨텍스트의 전 잡을 실행하므로 운영에선 항상 지정. 3.0 표)

insuhr:
  flyway:
    mode: validate

logging:
  level:
    com.portfolio.insuhr: DEBUG
