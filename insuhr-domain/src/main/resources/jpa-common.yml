# JPA/Hibernate 공통 설정 — JPA를 쓰는 모든 실행 모듈(api·batch·relay)이 공유한다.
#
# 여기 있는 이유(설계서 3.0, v2.0): ORA-18716 회피 설정이 세 application.yml에 복사돼 있었고,
# batch·relay에서 빠져 있다가 릴레이 세션에서 버그로 드러났다(문서로 "공통"이라 적어둔 것으로는
# 드리프트를 못 막는다). domain이 세 실행 모듈의 의존성이므로, 각 모듈이 이 파일을
# `spring.config.import: classpath:jpa-common.yml`로 끌어와 "JPA 전 모듈 공통"을 구조로 강제한다.
# 네 번째 실행 모듈이 생겨도 JPA를 쓰는 한 이 import를 넣어야 기동되므로 잊을 수 없다.
#
# 병합은 프로퍼티 키 단위다 — 모듈이 자기 application.yml에서 다른 키(예: format_sql)를 더해도
# 충돌하지 않는다.
spring:
  jpa:
    # 설계서 13.1: 스키마는 Flyway만 만든다. 엔티티로 DDL을 생성하지 않는다.
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        type:
          # 설계서 6.2의 감사 컬럼은 존 없는 TIMESTAMP다. Hibernate 7 기본값(TIMESTAMP_UTC)은
          # Instant를 TIMESTAMP WITH TIME ZONE으로 다뤄서 읽을 때 ORA-18716이 난다.
          preferred_instant_jdbc_type: TIMESTAMP
        jdbc:
          # 존 없는 컬럼에 Instant를 넣으려면 어느 존으로 기록할지 규약이 필요하다.
          # DB에는 UTC로만 적재한다 — Oracle 컨테이너의 SYSTIMESTAMP(기본 UTC)와 어긋나지
          # 않게 하려는 것이다. 응답의 +09:00 변환은 API 계층이 한다(설계서 7.1).
          time_zone: UTC
