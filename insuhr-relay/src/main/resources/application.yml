spring:
  application:
    name: insuhr-relay

  # 공통 설정은 domain이 소유한다(설계서 3.0 v2.0): jpa-common(ddl-auto=validate, ORA-18716 회피),
  # crypto-common(AES 키·pepper — 릴레이는 구독자 SECRET_ENC 복호화에 쓴다).
  config:
    import:
      - "classpath:jpa-common.yml"
      - "classpath:crypto-common.yml"

  datasource:
    url: ${INSUHR_DB_URL:jdbc:oracle:thin:@localhost:1521/FREEPDB1}
    username: ${INSUHR_DB_USER:insuhr}
    password: ${INSUHR_DB_PASSWORD:insuhr}
    driver-class-name: oracle.jdbc.OracleDriver

  # 마이그레이션 주체는 api 하나. validate 전용으로 켜둔다 (설계서 4.2)
  flyway:
    enabled: true

insuhr:
  flyway:
    mode: validate

  # insuhr.crypto(AES 키·pepper)는 domain의 crypto-common.yml이 소유한다(위 config.import). 릴레이는
  # 구독자 SECRET_ENC를 복호화해 HMAC 키로 쓰며 api와 동일한 키를 주입받아야 한다(설계서 3.0 v2.0, 10.3).

  # 릴레이 운영 파라미터(재시도 한도는 정책값 OUTBOX_MAX_RETRY에서 읽는다).
  relay:
    batch-size: 100
    retry-base-seconds: 30
    poll-interval-ms: 2000
    scheduler:
      enabled: true

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus

logging:
  level:
    com.portfolio.insuhr: DEBUG
